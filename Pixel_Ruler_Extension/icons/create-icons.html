<!DOCTYPE html>
<html>
<head>
    <title>Generate Icons</title>
</head>
<body>
    <h2>Icon Generator</h2>
    <p>Click the buttons to generate and download the required PNG icons:</p>
    
    <button onclick="generateIcon(16)">Generate icon16.png</button>
    <button onclick="generateIcon(48)">Generate icon48.png</button>
    <button onclick="generateIcon(128)">Generate icon128.png</button>
    
    <script>
        function generateIcon(size) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = size;
            canvas.height = size;
            
            // Blue background
            ctx.fillStyle = '#007acc';
            ctx.fillRect(0, 0, size, size);
            
            // White ruler lines
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = Math.max(1, size / 32);
            
            // Horizontal ruler
            ctx.beginPath();
            ctx.moveTo(size * 0.15, size * 0.3);
            ctx.lineTo(size * 0.85, size * 0.3);
            ctx.stroke();
            
            // Vertical ruler
            ctx.beginPath();
            ctx.moveTo(size * 0.3, size * 0.15);
            ctx.lineTo(size * 0.3, size * 0.85);
            ctx.stroke();
            
            // Guide lines
            ctx.strokeStyle = '#ff6b35';
            ctx.lineWidth = Math.max(1, size / 64);
            
            ctx.beginPath();
            ctx.moveTo(size * 0.6, size * 0.4);
            ctx.lineTo(size * 0.6, size * 0.8);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(size * 0.4, size * 0.6);
            ctx.lineTo(size * 0.8, size * 0.6);
            ctx.stroke();
            
            // Download
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `icon${size}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });
        }
    </script>
</body>
</html>
