<!-- Pixel Ruler Extension Icon - SVG Template -->
<!-- Use this SVG to generate PNG icons at different sizes -->
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="58" fill="#007acc" stroke="#005a9e" stroke-width="4"/>
  
  <!-- Ruler elements -->
  <!-- Horizontal ruler -->
  <rect x="20" y="35" width="88" height="8" rx="2" fill="white" opacity="0.9"/>
  
  <!-- Vertical ruler -->
  <rect x="35" y="20" width="8" height="88" rx="2" fill="white" opacity="0.9"/>
  
  <!-- Ruler marks - horizontal -->
  <g fill="white" opacity="0.8">
    <!-- Long marks -->
    <rect x="30" y="37" width="1" height="4"/>
    <rect x="40" y="37" width="1" height="4"/>
    <rect x="50" y="37" width="1" height="4"/>
    <rect x="60" y="37" width="1" height="4"/>
    <rect x="70" y="37" width="1" height="4"/>
    <rect x="80" y="37" width="1" height="4"/>
    <rect x="90" y="37" width="1" height="4"/>
    
    <!-- Short marks -->  
    <rect x="35" y="38" width="1" height="2"/>
    <rect x="45" y="38" width="1" height="2"/>
    <rect x="55" y="38" width="1" height="2"/>
    <rect x="65" y="38" width="1" height="2"/>
    <rect x="75" y="38" width="1" height="2"/>
    <rect x="85" y="38" width="1" height="2"/>
    <rect x="95" y="38" width="1" height="2"/>
  </g>
  
  <!-- Ruler marks - vertical -->
  <g fill="white" opacity="0.8">
    <!-- Long marks -->
    <rect x="37" y="30" width="4" height="1"/>
    <rect x="37" y="40" width="4" height="1"/>
    <rect x="37" y="50" width="4" height="1"/>
    <rect x="37" y="60" width="4" height="1"/>
    <rect x="37" y="70" width="4" height="1"/>
    <rect x="37" y="80" width="4" height="1"/>
    <rect x="37" y="90" width="4" height="1"/>
    
    <!-- Short marks -->
    <rect x="38" y="35" width="2" height="1"/>
    <rect x="38" y="45" width="2" height="1"/>
    <rect x="38" y="55" width="2" height="1"/>
    <rect x="38" y="65" width="2" height="1"/>
    <rect x="38" y="75" width="2" height="1"/>
    <rect x="38" y="85" width="2" height="1"/>
    <rect x="38" y="95" width="2" height="1"/>
  </g>
  
  <!-- Guide lines -->
  <line x1="55" y1="50" x2="55" y2="95" stroke="#ff6b35" stroke-width="2" opacity="0.8"/>
  <line x1="50" y1="75" x2="95" y2="75" stroke="#ff6b35" stroke-width="2" opacity="0.8"/>
  
  <!-- Corner indicator -->
  <rect x="35" y="35" width="8" height="8" fill="white" opacity="0.9" rx="1"/>
  
  <!-- Pixel indicator dot -->
  <circle cx="75" cy="65" r="3" fill="#4fc3f7"/>
  <circle cx="75" cy="65" r="1" fill="white"/>
</svg>